# HTTP server
server {
    listen 80;
    server_name api.henzo.app 165.22.101.13;

    # Resolver для динамического DNS резолвинга (Docker DNS)
    resolver 127.0.0.11 valid=30s;
    
    # Переменная для backend URL (отложенный резолвинг)
    set $backend_url http://backend:3001;

    # Ограничения
    client_max_body_size 10M;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # Логи
    access_log /var/log/nginx/henzo-access.log;
    error_log /var/log/nginx/henzo-error.log warn;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Health check endpoint (без логов)
    location /health {
        proxy_pass $backend_url/health;
        access_log off;
    }

    # Основное проксирование
    location / {
        # Проксируем все запросы (включая OPTIONS) в бэкенд
        # Nest.js обрабатывает CORS правильно
        # Используем переменную для отложенного DNS резолвинга
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        
        # Заголовки
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        # Явно передаем Origin для правильной обработки CORS
        proxy_set_header Origin $http_origin;
        
        # Важно: передаем заголовки CORS от бекенда
        # (proxy_pass_header не обязателен для CORS заголовков, но явно указываем для надежности)
        proxy_pass_header Access-Control-Allow-Origin;
        proxy_pass_header Access-Control-Allow-Methods;
        proxy_pass_header Access-Control-Allow-Headers;
        proxy_pass_header Access-Control-Allow-Credentials;
        proxy_pass_header Access-Control-Max-Age;
        
        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Буферизация
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        proxy_cache_bypass $http_upgrade;
    }

    # Отключаем логи для статики (если будет)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass $backend_url;
        expires 30d;
        access_log off;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name api.henzo.app 165.22.101.13;

    # Resolver для динамического DNS резолвинга (Docker DNS)
    resolver 127.0.0.11 valid=30s;
    
    # Переменная для backend URL (отложенный резолвинг)
    set $backend_url http://backend:3001;

    # SSL сертификаты Let's Encrypt (live/ — симлинки на archive/)
    ssl_certificate /etc/letsencrypt/live/api.henzo.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.henzo.app/privkey.pem;
    
    # Если сертификатов нет, закомментируй строки выше и используй самоподписанный
    # или временно редирект на HTTP (см. ниже)
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 10M;
    client_body_timeout 30s;
