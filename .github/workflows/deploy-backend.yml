name: Deploy Backend to DigitalOcean

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: |
          IMG="${{ env.REGISTRY }}/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')/backend:latest"
          echo "IMAGE_FULL=${IMG}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_FULL }}

  deploy:
    name: Deploy to server
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
    steps:
      - name: Set image name
        run: |
          IMG="${{ env.REGISTRY }}/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')/backend:latest"
          echo "IMAGE_FULL=${IMG}" >> $GITHUB_ENV

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/henzo/apps/backend
            git pull origin main
            # Optional: overwrite .env.production from GitHub (never commit this file).
            # On your machine:  [Convert]::ToBase64String([IO.File]::ReadAllBytes('.env.production'))  →  repo secret BACKEND_ENV_B64
            # Or: base64 -w0 .env.production  (Linux)
            if [ -n "${{ secrets.BACKEND_ENV_B64 }}" ]; then
              echo "${{ secrets.BACKEND_ENV_B64 }}" | base64 -d > .env.production
              chmod 600 .env.production
            fi
            if [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            fi
            export BACKEND_IMAGE=${{ env.IMAGE_FULL }}
            docker compose pull backend || { echo "Pull denied. Add GHCR_TOKEN secret (PAT with read:packages) or make package public."; exit 1; }
            docker compose up -d --no-deps backend
            sleep 10
            curl -f http://localhost/health || exit 1
            echo "✅ Deployment complete!"
